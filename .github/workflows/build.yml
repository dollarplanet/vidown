name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pyinstaller

      - name: Create specification file
        run: |
          cat > vidown.spec << 'EOF'
block_cipher = None
a = Analysis(['main.py'], pathex=[], binaries=[], datas=[], hiddenimports=['PySide6','yt_dlp'])
pyz = PYZ(a.pure, a.zipped_data, cipher=block_cipher)
exe = EXE(pyz, a.scripts, [], name='vidown', console=False, upx=True)
coll = COLLECT(exe, a.binaries, a.zipfiles, a.datas, name='vidown', upx=True)
EOF

      - name: Build
        run: |
          pyinstaller vidown.spec --distpath dist --workpath dist/build --specpath dist
          mkdir -p dist/vidown/ffmpeg

      - name: Create archive
        run: tar -cvf vidown-${{ github.ref_name }}-linux.tar.xz vidown --directory dist vidown

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: vidown-${{ github.ref_name }}-linux.tar.xz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pyinstaller

      - name: Create specification file
        run: |
          Set-Content -Path vidown.spec -Value @"
block_cipher = None
a = Analysis(['main.py'], pathex=[], binaries=[], datas=[], hiddenimports=['PySide6','yt_dlp'])
pyz = PYZ(a.pure, a.zipped_data, cipher=block_cipher)
exe = EXE(pyz, a.scripts, [], name='vidown', console=False, upx=True)
coll = COLLECT(exe, a.binaries, a.zipfiles, a.datas, name='vidown', upx=True)
"@

      - name: Build
        run: |
          pyinstaller vidown.spec --distpath dist --workpath dist\build --specpath dist
          New-Item -ItemType Directory -Path dist\vidown\ffmpeg -Force

      - name: Create archive
        run: Compress-Archive -Path dist\vidown -DestinationPath vidown-${{ github.ref_name }}-win.zip

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: vidown-${{ github.ref_name }}-win.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}