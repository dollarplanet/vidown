name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install pyinstaller yt-dlp

      - name: Build
        run: |
          pyinstaller vidown.spec --distpath dist --workpath dist/build
          mkdir -p dist/vidown/ffmpeg

      - name: Create archive
        run: |
          cd dist
          tar -cvf ../vidown-${{ github.ref_name }}-linux.tar.xz vidown

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: vidown-${{ github.ref_name }}-linux.tar.xz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}